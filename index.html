<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Tamu Digital - RSUD Sukajadi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h2><i class="fa-solid fa-hospital"></i> RSUD Sukajadi</h2>
    <button class="login-btn" id="loginBtn" onclick="showLogin()">
    <i class="fa-solid fa-right-to-bracket"></i> Login Admin
</button>
</header>

<!-- FORM BUKU TAMU -->
<div class="container" id="formPage">
    <h3>Buku Tamu Digital</h3>

<div id="waktuBox">
    <div id="tanggalSekarang"></div>
    <div id="jamSekarang" style="font-size:22px;font-weight:700;"></div>
</div>

    <form id="guestForm">
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="nama" required>
        </div>
        <div class="form-group">
            <label>Instansi</label>
            <input type="text" id="instansi">
        </div>
        <div class="form-group">
            <label>No HP</label>
            <input type="tel" id="hp" required>
        </div>
        <div class="form-group">
            <label>Keperluan</label>
            <textarea id="keperluan" required></textarea>
        </div>
        <div class="form-group">
            <label>Unit Tujuan</label>
            <select id="unit" required>
                <option value="">-- Pilih Unit --</option>
                <option>IGD</option>
                <option>Rawat Jalan</option>
                <option>Rawat Inap</option>
                <option>Administrasi</option>
                <option>Direksi</option>
		<option>Lainnya</option>
            </select>
        </div>
        <button type="submit" class="submit-btn">Kirim</button>
    </form>
</div>

<!-- LOGIN ADMIN -->
<!-- LOGIN ADMIN -->
<div class="container hidden" id="loginPage">
    <h3>Login Admin</h3>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="Masukkan Username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Masukkan Password">
    </div>

    <button class="submit-btn" onclick="login()">Login</button>
    <button class="logout-btn" style="margin-top:10px;background:gray;"
        onclick="backToForm()">Kembali</button>
</div>

<!-- DASHBOARD ADMIN -->
<div class="container hidden" id="adminPage">
    <h3>Dashboard Admin</h3>

    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <button class="submit-btn" style="background:green;width:auto;padding:8px 15px;"
            onclick="exportExcel()">Export to Excel</button>
    </div>

    <!-- CARD STATISTIK -->
    <div id="statistikCard" style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;">
        <div style="flex:1;background:#0f4c81;color:white;padding:15px;border-radius:10px;text-align:center;">
            <h4>Total Tamu</h4>
            <h2 id="totalTamu">0</h2>
        </div>
        <div style="flex:1;background:#17a2b8;color:white;padding:15px;border-radius:10px;text-align:center;">
            <h4>Tamu Hari Ini</h4>
            <h2 id="tamuHariIni">0</h2>
        </div>
    </div>

    <!-- GRAFIK -->
    <canvas id="guestChart"></canvas>

    <!-- TABEL -->
    <div style="overflow-x:auto;margin-top:20px;">
        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Instansi</th>
                    <th>No HP</th>
                    <th>Keperluan</th>
                    <th>Unit</th>
                    <th>Tanggal</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ================= FIREBASE CONFIG ================= */

const firebaseConfig = {
  apiKey: "AIzaSyDWm-Eg8fMr6nAeu0KXGn1uKHME5Q7BjtI",
  authDomain: "bukutamu-rsudsukajadi.firebaseapp.com",
  projectId: "bukutamu-rsudsukajadi",
  storageBucket: "bukutamu-rsudsukajadi.firebasestorage.app",
  messagingSenderId: "770254531991",
  appId: "1:770254531991:web:e1f90f21e7af5dda1568d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= JAM & TANGGAL ================= */

function updateWaktu(){
    const sekarang = new Date();

    const opsiTanggal = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };

    document.getElementById("tanggalSekarang").innerText =
        sekarang.toLocaleDateString('id-ID', opsiTanggal);

    document.getElementById("jamSekarang").innerText =
        sekarang.toLocaleTimeString('id-ID');
}

updateWaktu();
setInterval(updateWaktu, 1000);

/* ================= LOGIN ================= */

window.showLogin = function(){
    document.getElementById("formPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
};

window.login = function(){
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if(user === "admin" && pass === "rsud123"){
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
        loadData();
    } else {
        alert("Username atau Password salah!");
    }
};

window.logout = function(){
    document.getElementById("adminPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
};

window.backToForm = function(){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("formPage").classList.remove("hidden");
};

/* ================= SIMPAN DATA ================= */

document.getElementById("guestForm").addEventListener("submit", async function(e){
    e.preventDefault();

    try {
        await addDoc(collection(db, "tamu"), {
            nama: nama.value,
            instansi: instansi.value,
            hp: hp.value,
            keperluan: keperluan.value,
            unit: unit.value,
            tanggal: new Date()
        });

        alert("Data berhasil dikirim ke Firebase!");
        this.reset();

    } catch(error){
        console.error(error);
        alert("Gagal kirim data!");
    }
});

/* ================= LOAD DATA & GRAFIK ================= */

let chart;

async function loadData(){
    const snapshot = await getDocs(collection(db, "tamu"));

    const table = document.getElementById("dataTable");
    table.innerHTML = "";

    let unitCount = {};
    let total = 0;

    snapshot.forEach(doc => {
        const g = doc.data();
        total++;

        table.innerHTML += `
        <tr>
            <td>${g.nama}</td>
            <td>${g.instansi}</td>
            <td>${g.hp}</td>
            <td>${g.keperluan}</td>
            <td>${g.unit}</td>
            <td>${new Date(g.tanggal.seconds * 1000).toLocaleString()}</td>
        </tr>`;

        unitCount[g.unit] = (unitCount[g.unit] || 0) + 1;
    });

    document.getElementById("totalTamu").innerText = total;

    if(chart){
        chart.destroy();
    }

    const ctx = document.getElementById("guestChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: Object.keys(unitCount),
            datasets: [{
                label: "Jumlah Tamu per Unit",
                data: Object.values(unitCount),
                backgroundColor: "#0f4c81"
            }]
        },
        options: {
            responsive: true
        }
    });
}

</script>
</body>
</html>
